<!DOCTYPE html>
<html>
<head>
    <title>Data Dashboard</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
        }

        .container {
            width: 400px;
            padding: 40px;

            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);

            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px; /* equal spacing between elements */
        }

        h1 {
            margin: 0;
            font-size: 24px;
            text-align: center;
        }

        form {
            width: 100%;

            display: flex;
            flex-direction: column;
            gap: 15px; /* equal spacing */
        }

        input[type="file"] {
            width: 100%;
            padding: 12px;

            border: 2px dashed #ccc;
            border-radius: 8px;

            text-align: center;
        }

        button {
            width: 100%;
            padding: 12px;

            border: none;
            border-radius: 8px;

            background: #007bff;
            color: white;
            font-size: 16px;

            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Upload CSV File</h1>

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button type="submit">Upload</button>
        </form>
    </div>
</body>
</html>
